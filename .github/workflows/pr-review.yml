# .github/workflows/pr-review.yml

name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write    # needed to post comments

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt
          echo "diff_content=$(cat pr_diff.txt | head -c 8000)" >> $GITHUB_OUTPUT

      - name: Run Claude AI review
        id: review
        run: |
          REVIEW=$(curl -s https://api.anthropic.com/v1/messages \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -d '{
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 1024,
              "messages": [{
                "role": "user",
                "content": "Review this PR diff and give feedback on bugs, security, code quality:\n\n'"$(cat pr_diff.txt | head -c 6000)"'"
              }]
            }' | jq -r '.content[0].text')
          echo "review=$REVIEW" >> $GITHUB_OUTPUT

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI Code Review\n\n${{ steps.review.outputs.review }}`
            })