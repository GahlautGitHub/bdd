name: BDD Tests CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  bdd-tests:
    name: Run BDD Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-bdd pytest-html

      - name: Run BDD scenarios
        run: |
          pytest test_calculator_bdd.py \
            --html=reports/bdd-report-${{ matrix.python-version }}.html \
            --self-contained-html \
            -v

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdd-report-py${{ matrix.python-version }}
          path: reports/bdd-report-${{ matrix.python-version }}.html
          retention-days: 14

  notify:
    name: Notify on failure
    needs: bdd-tests
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Print failure notice
        run: echo "BDD tests failed — check artifacts for HTML report."
